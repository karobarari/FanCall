# Render Blueprint — single-origin deploy.
# One web service builds BOTH the Vite frontend and the Express API, and the API
# serves the built frontend. Frontend and API share one origin, so the session
# cookie is same-origin and works in every browser (incl. Safari/iOS, which
# blocks third-party cookies — the reason a split frontend/API on *.onrender.com
# subdomains couldn't stay logged in on phones).
#
# Deploy via Render dashboard → New → Blueprint. Afterwards:
#   1. Fill in DATABASE_URL (Neon) + ADMIN_EMAIL.
#   2. Set CLIENT_ORIGIN to THIS service's own URL (e.g. https://fancall.onrender.com).
#   3. After the first deploy, open the Shell and run `npm run db:setup`.
# Google OAuth (optional): also set GOOGLE_CLIENT_ID/SECRET and
# GOOGLE_REDIRECT_URI=https://<this-service>.onrender.com/api/auth/google/callback,
# and register that redirect URI in Google Cloud Console.

services:
  - type: web
    name: fancall
    runtime: node
    rootDir: server
    plan: starter          # a persistent disk requires a paid instance (not free)
    # Build the frontend (repo root → dist/) then the server (server/ → dist/).
    # --include=dev because NODE_ENV=production would otherwise skip the build
    # tools (vite, typescript) that live in devDependencies.
    buildCommand: >-
      npm --prefix .. ci --include=dev &&
      npm --prefix .. run build &&
      npm ci --include=dev &&
      npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: avatars
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: AVATAR_UPLOADS_DIR
        value: /var/data/avatars
      - key: DATABASE_SSL
        value: "true"
      # Relative API base → same-origin fetches (no cross-site cookie).
      - key: VITE_API_URL
        value: /api
      - key: JWT_SECRET
        generateValue: true
      # Fill these in the dashboard:
      - key: DATABASE_URL     # your Neon connection string
        sync: false
      - key: ADMIN_EMAIL      # the one account allowed to settle fixtures
        sync: false
      - key: CLIENT_ORIGIN    # set to this service's own URL (used by OAuth redirects)
        sync: false
      # Optional integrations — leave unset to keep those routes disabled (503).
      # Keep STRIPE_* unset until the GDPR/gambling legal gates clear.
      # - key: GOOGLE_CLIENT_ID
      # - key: GOOGLE_CLIENT_SECRET
      # - key: GOOGLE_REDIRECT_URI
      # - key: FOOTBALL_DATA_API_KEY
