name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fancall
          POSTGRES_PASSWORD: fancall
          POSTGRES_DB: fancall_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # A fresh, disposable Postgres per run — never a real database.
      DATABASE_URL: postgres://fancall:fancall@localhost:5432/fancall_test
      # Not a real secret; just needs to satisfy the min-length check in
      # config/env.ts for the server to boot in this job.
      JWT_SECRET: ci-only-secret-0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Load schema and seed data
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed-teams.sql

      - name: Type-check
        working-directory: server
        run: npx tsc --noEmit

      - name: Test
        working-directory: server
        run: npm test

      - name: Build
        working-directory: server
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npx vite build
